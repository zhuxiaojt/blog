              }
              .blog-item .thumbnail img { width: 100%; height: 100%; object-fit: cover; }
              .blog-item .thumbnail.hidden { display: none; }
              .blog-item .content { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 6px; }
              .blog-item .title {
                font-size: 18px;
                font-weight: 700;
                color: #333;
                line-height: 1.4;
                overflow: hidden;
                text-overflow: ellipsis;
                display: -webkit-box;
                -webkit-line-clamp: 2;
                -webkit-box-orient: vertical;
              }
              .blog-item .title:hover { color: #6c63ff; }
              .blog-item .keywords {
                font-size: 13px;
                color: #999;
                overflow: hidden;
                text-overflow: ellipsis;
                white-space: nowrap;
              }
              .blog-item .keywords .keyword { display: inline-block; }
              .blog-item .keywords .keyword:not(:last-child)::after { content: ' · '; }
              .blog-item .description {
                font-size: 14px;
                color: #888;
                line-height: 1.6;
                overflow: hidden;
                text-overflow: ellipsis;
                display: -webkit-box;
                -webkit-line-clamp: 2;
                -webkit-box-orient: vertical;
              }
              .blog-item .meta {
                font-size: 13px;
                color: #aaa;
                display: flex;
                gap: 16px;
                flex-wrap: wrap;
              }
              .loading { text-align: center; padding: 40px 0; color: #888; font-size: 14px; }
              .empty { text-align: center; padding: 40px 0; color: #aaa; font-size: 14px; }
              .error { text-align: center; padding: 40px 0; color: #e74c3c; font-size: 14px; }
              @media (max-width: 640px) {
                .blog-item { flex-direction: column; gap: 12px; padding: 12px; }
                .blog-item .thumbnail { width: 100%; height: 180px; }
                .appmain { padding: 16px; margin: 0 10px; }
                .blog-item .title { font-size: 16px; }
                .blog-item .meta { font-size: 12px; gap: 10px; }
              }
            </style>
          </head>
          <body>
            <nav class="top-nav">
              <div class="nav-menu">
                <a href="./" target="_self" class="active">首页</a>
              </div>
            </nav>
            <div class="appmain">
              <div id="blogList"><div class="loading">加载中...</div></div>
            </div>
            <script>
              (async function() {
                const container = document.getElementById('blogList');
                try {
                  const resp = await fetch('./blogs.json');
                  if (!resp.ok) throw new Error('HTTP ' + resp.status);
                  const data = await resp.json();
                  if (!data || data.length === 0) {
                    container.innerHTML = '<div class="empty">暂无文章</div>';
                    return;
                  }
                  let html = '<div class="blog-list">';
                  data.forEach(function(post) {
                    let kwHtml = '';
                    if (post.keywords) {
                      const kw = post.keywords.split(',').map(function(k) { return k.trim(); }).filter(function(k) { return k; });
                      kwHtml = kw.map(function(k) { return '<span class="keyword">' + k + '</span>'; }).join('');
                    }
                    let thumbClass = 'thumbnail';
                    let thumbHtml = '';
                    if (post.thumbnail) {
                      thumbHtml = '<img src="' + post.thumbnail + '" alt="' + post.title + '">';
                    } else {
                      thumbClass += ' hidden';
                    }
                    const displayDate = post.dateFormatted || post.date || '';
                    html += '<a href="' + post.filename + '" class="blog-item">';
                    html += '  <div class="' + thumbClass + '">' + thumbHtml + '</div>';
                    html += '  <div class="content">';
                    html += '    <div class="title">' + post.title + '</div>';
                    if (kwHtml) html += '    <div class="keywords">' + kwHtml + '</div>';
                    if (post.description) html += '    <div class="description">' + post.description + '</div>';
                    html += '    <div class="meta">';
                    if (displayDate) html += '      <span>' + displayDate + '</span>';
                    if (post.author) html += '      <span>' + post.author + '</span>';
                    html += '    </div>';
                    html += '  </div>';
                    html += '</a>';
                  });
                  html += '</div>';
                  container.innerHTML = html;
                } catch (err) {
                  console.error('加载失败:', err);
                  container.innerHTML = '<div class="error">加载失败，请刷新重试</div>';
                }
              })();
            </script>
          </body>
        </html>
        EOF
        
        echo "✅ index.html created"
    
    - name: List generated files
      run: |
        echo "Generated files:"
        ls -la "${{ github.workspace }}/${{ github.event.inputs.filename }}"
        ls -la "${{ github.workspace }}/index.html"
        echo ""
        echo "staging.md status:"
        cat "${{ github.workspace }}/staging.md" | head -n 5 || echo "（已清空）"
        echo ""
        echo "config.json:"
        cat "${{ github.workspace }}/config.json"
        echo ""
        echo "blogs.json (first 30 lines):"
        cat "${{ github.workspace }}/blogs.json" | head -n 30
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: generated-html
        path: |
          ${{ github.workspace }}/${{ github.event.inputs.filename }}
          ${{ github.workspace }}/index.html
          ${{ github.workspace }}/blogs.json
          ${{ github.workspace }}/config.json
    
    - name: Commit and push
      run: |
        cd "${{ github.workspace }}"
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add "${{ github.event.inputs.filename }}" index.html blogs.json config.json staging.md
        git commit -m "Post article: ${{ github.event.inputs.title }}" || echo "No changes to commit"
        git push || echo "Push failed or no changes"
